<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items:center;
        height: 100vh;
        background-color: #f8f9fa;
        font-family: Arial, sans-serif;
        color: #333;
      }
      .container {
        text-align: center;
        background:white;
        padding:40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }
      h1 {
        font-size: 120px;
        color: #e74c3c;
        line-height: 1;
      }
      h2 {
        font-size: 24px;
        margin: 10px 0 20px;
      }
      .btn {
        margin: 12px auto;
        padding: 12px 24px;
        background-color: #ffffff;
        color: black;
        border: 1px solid black;
        text-decoration: none;
        border-radius: 5px;
      }
      .btn:hover {
        color: white;
        background-color: black;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h3>Student Skill Tracker</h3>
      <h2>The page you are looking for does not exist.</h2>
      <p>Please check the URL or return to the application.</p>

      <a href="/StudentSkillTracker/" class="btn">Go to Login</a>

    </div>
  </body>
</html>
